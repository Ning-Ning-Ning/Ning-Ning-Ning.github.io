<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>用户用电量曲线</title>
  <style>
    :root {
      color-scheme: light;
      --page:#f4f7f6; --surface:#fff; --ink:#15201c; --muted:#66736e; --grid:#dfe7e3;
      --actual:#087f5b; --predicted:#b85c00; --adjusted:#6554c0; --focus:#075d45; --danger:#a63d40;
      font-family:Arial,"Microsoft YaHei",sans-serif;
    }
    * { box-sizing:border-box; }
    body { margin:0; min-width:320px; background:var(--page); color:var(--ink); }
    main { width:min(1120px,calc(100% - 32px)); margin:40px auto; }
    .heading { display:flex; align-items:end; justify-content:space-between; gap:24px; margin-bottom:20px; }
    .eyebrow { margin:0 0 8px; color:var(--actual); font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(26px,4vw,42px); line-height:1.1; }
    h2 { margin:0; font-size:19px; }
    .subtitle { margin:10px 0 0; color:var(--muted); }
    .date-control { display:grid; gap:7px; min-width:190px; color:var(--muted); font-size:13px; font-weight:700; }
    input[type="date"],input[type="number"] { min-height:42px; border:1px solid #c8d4ce; border-radius:8px; background:var(--surface); color:var(--ink); padding:8px 11px; font:inherit; }
    input[type="date"] { width:100%; }
    button { min-height:40px; border:1px solid #b8c6bf; border-radius:8px; background:var(--surface); color:var(--ink); padding:8px 14px; font:inherit; font-weight:700; cursor:pointer; }
    button:hover { background:#f4f7f6; }
    button:disabled { cursor:not-allowed; opacity:.55; }
    button.primary { border-color:var(--adjusted); background:var(--adjusted); color:#fff; }
    button.active { border-color:var(--adjusted); background:#eeebff; color:#493a9e; }
    input:focus-visible,button:focus-visible,.hit-area:focus-visible { outline:3px solid color-mix(in srgb,var(--focus) 35%,transparent); outline-offset:2px; }
    .card { border:1px solid #e0e7e3; border-radius:16px; background:var(--surface); box-shadow:0 14px 40px rgba(29,51,43,.08); overflow:hidden; }
    .summary { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:1px; padding:1px; background:#e7ece9; border-bottom:1px solid #e7ece9; }
    .metric { min-width:0; padding:18px 20px; background:var(--surface); }
    .metric-label { color:var(--muted); font-size:12px; }
    .metric-value { display:block; margin-top:5px; font-size:19px; font-weight:700; font-variant-numeric:tabular-nums; }
    .chart-tools { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; padding:14px 24px 0; }
    .tool-note { color:var(--muted); font-size:13px; }
    .legend { display:flex; flex-wrap:wrap; gap:18px; padding:14px 24px 0; color:var(--muted); font-size:13px; }
    .legend-item { display:inline-flex; align-items:center; gap:8px; }
    .legend-line { width:30px; border-top:3px solid; }
    .legend-line.actual { border-color:var(--actual); }
    .legend-line.predicted { border-color:var(--predicted); }
    .legend-line.adjusted { border-color:var(--adjusted); border-top-style:dashed; }
    .chart-shell { position:relative; min-height:480px; padding:8px 20px 12px; }
    .chart-shell.selecting { user-select:none; }
    .chart-shell.selecting #chart { touch-action:none; cursor:crosshair; }
    #chart { display:block; width:100%; height:auto; min-height:380px; }
    .grid { stroke:var(--grid); stroke-width:1; }
    .axis { stroke:#9eaaa4; stroke-width:1; }
    .tick { fill:var(--muted); font-size:12px; }
    .axis-title { fill:var(--muted); font-size:13px; font-weight:700; }
    .curve { fill:none; stroke-width:2.5; stroke-linejoin:round; stroke-linecap:round; }
    .curve.actual { stroke:var(--actual); }
    .curve.predicted { stroke:var(--predicted); }
    .curve.adjusted { stroke:var(--adjusted); stroke-dasharray:9 6; }
    .point { fill:var(--surface); stroke-width:2; pointer-events:none; }
    .point.actual { stroke:var(--actual); }
    .point.predicted { stroke:var(--predicted); }
    .point.adjusted { stroke:var(--adjusted); }
    .selected-ring { fill:none; stroke:var(--adjusted); stroke-width:3; pointer-events:none; }
    .selection-box { fill:rgba(101,84,192,.13); stroke:var(--adjusted); stroke-width:1.5; stroke-dasharray:6 4; pointer-events:none; }
    .hit-area { fill:transparent; cursor:crosshair; }
    .crosshair { stroke:#82928b; stroke-width:1; stroke-dasharray:3 3; pointer-events:none; }
    .tooltip { position:absolute; z-index:2; min-width:220px; padding:10px 12px; border-radius:8px; background:#15201c; color:#fff; font-size:13px; line-height:1.65; pointer-events:none; transform:translate(-50%,calc(-100% - 14px)); box-shadow:0 7px 20px rgba(0,0,0,.2); }
    .tooltip-row { display:flex; justify-content:space-between; gap:18px; }
    .tooltip-note { color:#d6d0ff; font-size:11px; }
    .status { position:absolute; inset:0; display:grid; place-items:center; padding:32px; background:rgba(255,255,255,.92); color:var(--muted); text-align:center; }
    .status.error,.save-status.error { color:var(--danger); }
    [hidden] { display:none !important; }
    .editor { margin:0 20px 20px; border:1px solid #dcd6ff; border-radius:12px; background:#faf9ff; padding:18px; }
    .editor-head,.editor-actions,.batch-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .editor-warning { margin:8px 0 16px; color:var(--danger); font-size:13px; }
    .batch-row { justify-content:flex-start; border-radius:9px; background:#f1efff; padding:12px; }
    .batch-row input { width:180px; }
    .point-inputs { display:grid; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); gap:10px; margin:16px 0; }
    .point-input { display:grid; gap:5px; color:var(--muted); font-size:12px; font-weight:700; }
    .editor-actions { justify-content:flex-end; }
    .save-status { margin-right:auto; color:var(--muted); font-size:13px; }
    details { border-top:1px solid #e7ece9; }
    summary { cursor:pointer; padding:16px 24px; color:var(--ink); font-weight:700; }
    .table-wrap { max-height:390px; overflow:auto; }
    table { width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums; white-space:nowrap; }
    th,td { padding:11px 20px; border-top:1px solid #edf1ef; text-align:right; }
    th:first-child,td:first-child { text-align:left; }
    th { position:sticky; top:0; z-index:1; background:#f8faf9; color:var(--muted); font-size:12px; }
    .fallback { color:var(--adjusted); font-size:11px; }
    .select-cell { display:flex; align-items:center; justify-content:flex-end; gap:8px; }
    .mode-selector { display:flex; gap:0; margin:10px 0 16px; border:1px solid #dcd6ff; border-radius:8px; overflow:hidden; }
    .mode-btn { flex:1; min-height:38px; border:none; border-radius:0; background:transparent; color:var(--muted); font:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:background .15s,color .15s; }
    .mode-btn:hover { background:#f1efff; }
    .mode-btn.active { background:var(--adjusted); color:#fff; }
    .mode-btn + .mode-btn { border-left:1px solid #dcd6ff; }
    .ratio-info { display:flex; flex-wrap:wrap; align-items:center; gap:4px 8px; font-size:12px; color:var(--muted); }
    .ratio-info input { width:80px; }
    .ratio-preview { font-weight:700; color:var(--adjusted); white-space:nowrap; }
    .ratio-disabled { color:var(--danger); font-size:12px; }
    .point-inputs.ratio-mode { grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); }
    @media (max-width:760px) {
      main { width:min(100% - 20px,1120px); margin:22px auto; }
      .heading { align-items:stretch; flex-direction:column; }
      .date-control { width:100%; }
      .summary { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .metric { padding:15px; }
      .chart-tools,.legend { padding-inline:16px; }
      .chart-shell { min-height:390px; padding:8px 6px; overflow-x:auto; }
      #chart { min-width:760px; min-height:340px; }
      .editor { margin-inline:10px; }
      .batch-row input { width:100%; }
      th,td { padding:10px 14px; }
    }
  </style>
</head>
<body>
  <main>
    <header class="heading">
      <div><p class="eyebrow">User electricity consumption</p><h1>用户用电量曲线</h1><p class="subtitle">实际、预测与调整后用电量 · 24 个时段</p></div>
      <label class="date-control" for="date-picker">选择日期<input id="date-picker" type="date" disabled></label>
    </header>
    <section class="card" aria-labelledby="chart-title">
      <div class="summary" aria-live="polite">
        <div class="metric"><span class="metric-label">日期</span><strong class="metric-value" id="metric-date">—</strong></div>
        <div class="metric"><span class="metric-label">实际合计</span><strong class="metric-value" id="metric-actual">—</strong></div>
        <div class="metric"><span class="metric-label">预测合计</span><strong class="metric-value" id="metric-predicted">—</strong></div>
        <div class="metric"><span class="metric-label">调整后合计</span><strong class="metric-value" id="metric-adjusted">—</strong></div>
      </div>
      <div class="chart-tools">
        <div><button id="selection-toggle" type="button" aria-pressed="false">框选调整点</button> <button id="selection-clear" type="button" disabled>清空选择</button></div>
        <span class="tool-note" id="selection-note">开启后拖动画框；只会选中调整后用电量点。</span>
      </div>
      <div class="legend" aria-label="图例">
        <span class="legend-item"><span class="legend-line predicted"></span>预测用电量（最上层）</span>
        <span class="legend-item"><span class="legend-line adjusted"></span>调整后用电量（虚线）</span>
        <span class="legend-item"><span class="legend-line actual"></span>实际用电量（最下层）</span>
      </div>
      <div class="chart-shell" id="chart-shell">
        <svg id="chart" viewBox="0 0 1040 430" role="img" aria-labelledby="chart-title chart-desc">
          <title id="chart-title">实际、预测与调整后用户用电量折线图</title>
          <desc id="chart-desc">预测位于最上层，调整后位于中层并使用虚线，实际位于最下层。可开启框选模式选择调整后点。</desc>
        </svg>
        <div class="tooltip" id="tooltip" role="status" hidden></div>
        <div class="status" id="status">正在连接 Supabase…</div>
      </div>
      <section class="editor" id="editor" aria-labelledby="editor-title" hidden>
        <div class="editor-head"><h2 id="editor-title">编辑调整后用电量（<span id="selected-count">0</span> 个时段）</h2><button id="editor-clear" type="button">取消选择</button></div>
        <p class="editor-warning">公开编辑：保存会修改 Supabase 中的全局数据，并影响所有访问者。</p>
        <div class="mode-selector"><button class="mode-btn active" id="mode-direct" type="button">直接设置 MWh</button><button class="mode-btn" id="mode-ratio" type="button">按预测值比例</button></div>
        <div class="batch-row" id="batch-direct"><label for="batch-value">全部设为（MWh）</label><input id="batch-value" type="number" min="0" max="1000" step="0.001"><button id="batch-apply" type="button">应用到选中时段</button></div>
        <div class="batch-row" id="batch-ratio" hidden><label for="batch-ratio-value">全部比例设为</label><input id="batch-ratio-value" type="number" min="0" max="100" step="0.00001"><button id="batch-ratio-apply" type="button">应用到选中时段</button></div>
        <div class="point-inputs" id="point-inputs"></div>
        <div class="editor-actions"><span class="save-status" id="save-status" role="status"></span><button id="editor-cancel" type="button">取消修改</button><button class="primary" id="editor-save" type="button">保存到 Supabase</button></div>
      </section>
      <details>
        <summary>查看 24 个时段的详细数据（可用复选框选择调整点）</summary>
        <div class="table-wrap"><table><thead><tr><th scope="col">时段</th><th scope="col">实际（MWh）</th><th scope="col">预测（MWh）</th><th scope="col">调整后（MWh）</th></tr></thead><tbody id="data-body"></tbody></table></div>
      </details>
    </section>
  </main>
  <script>
    "use strict";
    const SUPABASE_URL="https://kputrrbbcmxbnhwhxvoo.supabase.co";
    const SUPABASE_KEY="sb_publishable__oSojg5CJQVmyKJkn_8D5A_Qbq8OXn0";
    const TABLE_URL=`${SUPABASE_URL}/rest/v1/daily_curves`;
    const UPDATE_URL=`${SUPABASE_URL}/functions/v1/update-curve-adjustments`;
    const SVG_NS="http://www.w3.org/2000/svg";
    const SERIES={actual:{key:"actual",label:"实际用电量"},adjusted:{key:"adjusted",label:"调整后用电量"},predicted:{key:"predicted",label:"预测用电量"}};
    const VISUAL_ORDER=[SERIES.actual,SERIES.adjusted,SERIES.predicted];
    const size={width:1040,height:430,top:30,right:28,bottom:64,left:78};
    const plotWidth=size.width-size.left-size.right,plotHeight=size.height-size.top-size.bottom;
    const datePicker=document.querySelector("#date-picker"),chart=document.querySelector("#chart"),chartShell=document.querySelector("#chart-shell"),tooltip=document.querySelector("#tooltip"),status=document.querySelector("#status"),dataBody=document.querySelector("#data-body");
    const selectionToggle=document.querySelector("#selection-toggle"),selectionClear=document.querySelector("#selection-clear"),editor=document.querySelector("#editor"),selectedCount=document.querySelector("#selected-count"),pointInputs=document.querySelector("#point-inputs"),batchValue=document.querySelector("#batch-value"),batchApply=document.querySelector("#batch-apply"),editorClear=document.querySelector("#editor-clear"),editorCancel=document.querySelector("#editor-cancel"),editorSave=document.querySelector("#editor-save"),saveStatus=document.querySelector("#save-status"),modeDirectBtn=document.querySelector("#mode-direct"),modeRatioBtn=document.querySelector("#mode-ratio"),batchDirectRow=document.querySelector("#batch-direct"),batchRatioRow=document.querySelector("#batch-ratio"),batchRatioValue=document.querySelector("#batch-ratio-value"),batchRatioApply=document.querySelector("#batch-ratio-apply");
    const metrics={date:document.querySelector("#metric-date"),actual:document.querySelector("#metric-actual"),predicted:document.querySelector("#metric-predicted"),adjusted:document.querySelector("#metric-adjusted")};
    const requestHeaders={apikey:SUPABASE_KEY,Accept:"application/json"};
    let currentRows=[],selectedHours=new Set(),selectionMode=false,drag=null,scale=null,editorMode="direct",directDrafts={},ratioDrafts={};

    function svgElement(name,attrs={}){const el=document.createElementNS(SVG_NS,name);Object.entries(attrs).forEach(([k,v])=>el.setAttribute(k,v));return el;}
    function setStatus(message,isError=false){status.textContent=message;status.classList.toggle("error",isError);status.hidden=false;}
    function formatValue(value){return value===null?"—":value.toFixed(5);}
    function localTomorrow(){const d=new Date();d.setDate(d.getDate()+1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
    function clampDate(value,min,max){return value<min?min:value>max?max:value;}
    async function fetchRows(query){const response=await fetch(`${TABLE_URL}?${query}`,{headers:requestHeaders});if(!response.ok)throw new Error(`Supabase 请求失败（HTTP ${response.status}）`);return response.json();}
    async function initialize(){try{const [oldest,newest]=await Promise.all([fetchRows("select=date&order=date.asc&limit=1"),fetchRows("select=date&order=date.desc&limit=1")]);if(!oldest.length||!newest.length){setStatus("Supabase 中暂无用电量数据。",true);return;}datePicker.min=oldest[0].date;datePicker.max=newest[0].date;datePicker.value=clampDate(localTomorrow(),datePicker.min,datePicker.max);datePicker.disabled=false;await loadDate(datePicker.value);}catch(error){console.error(error);setStatus("无法加载数据，请稍后重试。",true);}}
    async function loadDate(date){datePicker.disabled=true;setStatus("正在加载该日用电量…");clearSelection(false);try{const rows=await fetchRows(`select=date,hour,actual_value,predicted_value,adjusted_value&date=eq.${encodeURIComponent(date)}&order=hour.asc`);if(rows.length!==24)throw new Error(`该日应有 24 条数据，实际为 ${rows.length} 条`);currentRows=rows.map(row=>{const actual=row.actual_value===null?null:Number(row.actual_value),predicted=row.predicted_value===null?null:Number(row.predicted_value),rawAdjusted=row.adjusted_value===null?null:Number(row.adjusted_value);return{date:row.date,hour:Number(row.hour),actual,predicted,adjusted:rawAdjusted??predicted,adjustedFallback:rawAdjusted===null&&predicted!==null};});render();status.hidden=true;}catch(error){console.error(error);clearChart();setStatus(error.message||"该日数据加载失败。",true);}finally{datePicker.disabled=false;}}
    function clearChart(){hideTooltip();[...chart.children].forEach(child=>{if(!child.matches("title,desc"))child.remove();});dataBody.replaceChildren();}
    function pathFor(values,x,y){let path="",drawing=false;values.forEach((value,hour)=>{if(value===null){drawing=false;return;}path+=`${drawing?" L":" M"} ${x(hour+.5)} ${y(value)}`;drawing=true;});return path;}
    function totalFor(key){const values=currentRows.map(row=>row[key]).filter(v=>v!==null);return values.length?`${values.reduce((a,b)=>a+b,0).toFixed(3)} MWh`:"暂无数据";}
    function render(){clearChart();const all=VISUAL_ORDER.flatMap(s=>currentRows.map(r=>r[s.key])).filter(v=>v!==null),max=Math.max(...all,.01),yMax=Math.ceil(max/.05)*.05,x=h=>size.left+h/24*plotWidth,y=v=>size.top+plotHeight-v/yMax*plotHeight;scale={x,y};
      for(let step=0;step<=5;step++){const value=yMax*step/5,yp=y(value);chart.append(svgElement("line",{x1:size.left,y1:yp,x2:size.width-size.right,y2:yp,class:"grid"}));const label=svgElement("text",{x:size.left-12,y:yp+4,class:"tick","text-anchor":"end"});label.textContent=value.toFixed(2);chart.append(label);}for(let h=0;h<=24;h+=2){const label=svgElement("text",{x:x(h),y:size.height-size.bottom+25,class:"tick","text-anchor":"middle"});label.textContent=h;chart.append(label);}chart.append(svgElement("line",{x1:size.left,y1:size.top,x2:size.left,y2:size.height-size.bottom,class:"axis"}));chart.append(svgElement("line",{x1:size.left,y1:size.height-size.bottom,x2:size.width-size.right,y2:size.height-size.bottom,class:"axis"}));const xt=svgElement("text",{x:size.left+plotWidth/2,y:size.height-12,class:"axis-title","text-anchor":"middle"});xt.textContent="时段（0–24）";chart.append(xt);const yt=svgElement("text",{x:20,y:size.top+plotHeight/2,class:"axis-title",transform:`rotate(-90 20 ${size.top+plotHeight/2})`,"text-anchor":"middle"});yt.textContent="用电量（MWh）";chart.append(yt);
      VISUAL_ORDER.forEach(series=>{const values=currentRows.map(r=>r[series.key]),path=pathFor(values,x,y);if(path)chart.append(svgElement("path",{d:path,class:`curve ${series.key}`,"data-series":series.key}));values.forEach((value,hour)=>{if(value!==null)chart.append(svgElement("circle",{cx:x(hour+.5),cy:y(value),r:3.5,class:`point ${series.key}`,"data-hour":hour}));});});
      currentRows.forEach(row=>{const hit=svgElement("rect",{x:x(row.hour),y:size.top,width:plotWidth/24,height:plotHeight,class:"hit-area",tabindex:0,focusable:"true",role:"button","aria-label":`第 ${row.hour+1} 时段，实际 ${formatValue(row.actual)}，预测 ${formatValue(row.predicted)}，调整后 ${formatValue(row.adjusted)} MWh`});hit.addEventListener("mouseenter",()=>{if(!selectionMode)showTooltip(row,x(row.hour+.5),size.top+20);});hit.addEventListener("focus",()=>{if(!selectionMode)showTooltip(row,x(row.hour+.5),size.top+20);});hit.addEventListener("mouseleave",hideTooltip);hit.addEventListener("blur",hideTooltip);chart.append(hit);
        const tr=document.createElement("tr"),values=[`${row.hour}:00–${row.hour+1}:00（第 ${row.hour+1} 时段）`,formatValue(row.actual),formatValue(row.predicted)];values.forEach(v=>{const td=document.createElement("td");td.textContent=v;tr.append(td);});const cell=document.createElement("td"),wrap=document.createElement("span");wrap.className="select-cell";const checkbox=document.createElement("input");checkbox.type="checkbox";checkbox.disabled=row.adjusted===null;checkbox.checked=selectedHours.has(row.hour);checkbox.setAttribute("aria-label",`选择第 ${row.hour+1} 时段的调整后用电量`);checkbox.addEventListener("change",()=>toggleHour(row.hour,checkbox.checked));const text=document.createElement("span");text.textContent=formatValue(row.adjusted);if(row.adjustedFallback){const note=document.createElement("span");note.className="fallback";note.textContent="（默认预测值）";text.append(note);}wrap.append(checkbox,text);cell.append(wrap);tr.append(cell);dataBody.append(tr);});
      drawSelectionRings();metrics.date.textContent=currentRows[0].date;metrics.actual.textContent=totalFor("actual");metrics.predicted.textContent=totalFor("predicted");metrics.adjusted.textContent=totalFor("adjusted");updateEditor();}
    function drawSelectionRings(){chart.querySelectorAll(".selected-ring").forEach(el=>el.remove());if(!scale)return;selectedHours.forEach(hour=>{const row=currentRows[hour];if(row?.adjusted!==null)chart.append(svgElement("circle",{cx:scale.x(hour+.5),cy:scale.y(row.adjusted),r:8,class:"selected-ring","data-selected-hour":hour}));});}
    function svgPoint(event){const rect=chart.getBoundingClientRect();return{x:(event.clientX-rect.left)*size.width/rect.width,y:(event.clientY-rect.top)*size.height/rect.height};}
    function boxAttrs(a,b){return{x:Math.min(a.x,b.x),y:Math.min(a.y,b.y),width:Math.abs(a.x-b.x),height:Math.abs(a.y-b.y)};}
    function beginSelection(event){if(!selectionMode||!scale)return;event.preventDefault();hideTooltip();const start=svgPoint(event),box=svgElement("rect",{class:"selection-box",x:start.x,y:start.y,width:0,height:0});chart.append(box);drag={pointerId:event.pointerId,start,current:start,box};chart.setPointerCapture(event.pointerId);}
    function moveSelection(event){if(!drag||event.pointerId!==drag.pointerId)return;event.preventDefault();drag.current=svgPoint(event);Object.entries(boxAttrs(drag.start,drag.current)).forEach(([k,v])=>drag.box.setAttribute(k,v));}
    function endSelection(event){if(!drag||event.pointerId!==drag.pointerId)return;const bounds=boxAttrs(drag.start,drag.current);currentRows.forEach(row=>{if(row.adjusted===null)return;const px=scale.x(row.hour+.5),py=scale.y(row.adjusted);if(px>=bounds.x&&px<=bounds.x+bounds.width&&py>=bounds.y&&py<=bounds.y+bounds.height)selectedHours.add(row.hour);});drag.box.remove();drag=null;drawSelectionRings();renderTableChecks();updateEditor();}
    function renderTableChecks(){document.querySelectorAll("#data-body input[type=checkbox]").forEach((box,index)=>box.checked=selectedHours.has(index));}
    function toggleHour(hour,checked){if(checked)selectedHours.add(hour);else selectedHours.delete(hour);drawSelectionRings();updateEditor();}
    function setSelectionMode(enabled){selectionMode=enabled;selectionToggle.classList.toggle("active",enabled);selectionToggle.setAttribute("aria-pressed",String(enabled));selectionToggle.textContent=enabled?"退出框选":"框选调整点";chartShell.classList.toggle("selecting",enabled);if(enabled)hideTooltip();}
    function clearSelection(rerender=true){selectedHours.clear();directDrafts={};ratioDrafts={};saveStatus.textContent="";editor.hidden=true;selectionClear.disabled=true;if(rerender&&currentRows.length){drawSelectionRings();renderTableChecks();}}
    function updateEditor(){const hours=[...selectedHours].sort((a,b)=>a-b);selectionClear.disabled=!hours.length;selectedCount.textContent=hours.length;editor.hidden=!hours.length;if(!hours.length)return;modeDirectBtn.classList.toggle("active",editorMode==="direct");modeRatioBtn.classList.toggle("active",editorMode==="ratio");batchDirectRow.hidden=editorMode!=="direct";batchRatioRow.hidden=editorMode!=="ratio";editorSave.textContent=editorMode==="direct"?"保存直接数值":"按比例计算并保存";pointInputs.classList.toggle("ratio-mode",editorMode==="ratio");pointInputs.replaceChildren();hours.forEach(hour=>{const row=currentRows[hour],label=document.createElement("label");label.className="point-input";label.textContent=`第 ${hour+1} 时段（${hour}:00–${hour+1}:00）`;if(editorMode==="direct"){const input=document.createElement("input");input.type="number";input.min="0";input.max="1000";input.step="0.001";input.required=true;input.value=hour in directDrafts?directDrafts[hour]:String(row.adjusted);input.dataset.hour=hour;input.addEventListener("input",()=>{directDrafts[hour]=input.value;});label.append(input);}else{const predicted=row.predicted;if(predicted===null){const note=document.createElement("span");note.className="ratio-disabled";note.textContent="无预测值，无法按比例调整";label.append(note);}else{const info=document.createElement("div");info.className="ratio-info";const predSpan=document.createElement("span");predSpan.textContent=`预测 ${predicted.toFixed(5)} ×`;const input=document.createElement("input");input.type="number";input.min="0";input.max="100";input.step="0.00001";input.required=true;input.value=hour in ratioDrafts?ratioDrafts[hour]:predicted===0?"1":String(parseFloat((row.adjusted/predicted).toFixed(5)));input.dataset.hour=hour;const preview=document.createElement("span");preview.className="ratio-preview";function refreshPreview(){const ratio=Number(input.value);if(input.value===""||!Number.isFinite(ratio)||ratio<0){preview.textContent="= —";}else{preview.textContent=`= ${parseFloat((predicted*ratio).toFixed(3))} MWh`;}ratioDrafts[hour]=input.value;}refreshPreview();input.addEventListener("input",refreshPreview);info.append(predSpan,input,preview);label.append(info);}}pointInputs.append(label);});}
    function showTooltip(row,cx,cy){chart.querySelectorAll(".crosshair").forEach(el=>el.remove());chart.append(svgElement("line",{x1:cx,y1:size.top,x2:cx,y2:size.height-size.bottom,class:"crosshair"}));const note=row.adjustedFallback?'<div class="tooltip-note">调整后为空，默认采用预测值</div>':"";tooltip.innerHTML=`<strong>第 ${row.hour+1} 时段 · ${row.hour}:00–${row.hour+1}:00</strong><div class="tooltip-row"><span>实际</span><span>${formatValue(row.actual)}${row.actual===null?"":" MWh"}</span></div><div class="tooltip-row"><span>预测</span><span>${formatValue(row.predicted)}${row.predicted===null?"":" MWh"}</span></div><div class="tooltip-row"><span>调整后</span><span>${formatValue(row.adjusted)}${row.adjusted===null?"":" MWh"}</span></div>${note}`;const sr=chart.getBoundingClientRect(),cr=chartShell.getBoundingClientRect();tooltip.style.left=`${sr.left-cr.left+cx/size.width*sr.width}px`;tooltip.style.top=`${sr.top-cr.top+cy/size.height*sr.height}px`;tooltip.hidden=false;}
    function hideTooltip(){tooltip.hidden=true;chart.querySelectorAll(".crosshair").forEach(el=>el.remove());}
    function editorValues(){if(editorMode==="direct"){return[...pointInputs.querySelectorAll("input")].map(input=>{const value=Number(input.value);if(input.value===""||!Number.isFinite(value)||value<0||value>1000)throw new Error(`第 ${Number(input.dataset.hour)+1} 时段请输入 0..1000 的有效数值`);return{hour:Number(input.dataset.hour),adjusted_value:value};});}const nullHours=[...selectedHours].filter(h=>currentRows[h].predicted===null);if(nullHours.length)throw new Error(`第 ${nullHours.map(h=>h+1).join("、")} 时段无预测值，无法按比例调整。请取消选择这些时段或切换到直接设置模式。`);return[...pointInputs.querySelectorAll("input")].map(input=>{const ratio=Number(input.value),hour=Number(input.dataset.hour);if(input.value===""||!Number.isFinite(ratio)||ratio<0||ratio>100)throw new Error(`第 ${hour+1} 时段比例必须在 0..100 之间`);const adjusted_value=parseFloat((currentRows[hour].predicted*ratio).toFixed(3));if(adjusted_value>1000)throw new Error(`第 ${hour+1} 时段计算结果 ${adjusted_value} MWh 超出上限 1000`);return{hour,adjusted_value};});}
    async function saveAdjustments(){try{const updates=editorValues();editorSave.disabled=true;saveStatus.className="save-status";saveStatus.textContent="正在保存…";const response=await fetch(UPDATE_URL,{method:"POST",headers:{apikey:SUPABASE_KEY,"Content-Type":"application/json"},body:JSON.stringify({date:datePicker.value,updates})});const body=await response.json().catch(()=>({}));if(!response.ok)throw new Error(body.error||`保存失败（HTTP ${response.status}）`);clearSelection(false);await loadDate(datePicker.value);}catch(error){console.error(error);saveStatus.className="save-status error";saveStatus.textContent=error.message||"保存失败";}finally{editorSave.disabled=false;}}
    selectionToggle.addEventListener("click",()=>setSelectionMode(!selectionMode));selectionClear.addEventListener("click",()=>clearSelection());editorClear.addEventListener("click",()=>clearSelection());editorCancel.addEventListener("click",()=>{directDrafts={};ratioDrafts={};updateEditor();saveStatus.textContent="";});modeDirectBtn.addEventListener("click",()=>{if(editorMode==="direct")return;editorMode="direct";saveStatus.textContent="";updateEditor();});modeRatioBtn.addEventListener("click",()=>{if(editorMode==="ratio")return;editorMode="ratio";saveStatus.textContent="";updateEditor();});batchApply.addEventListener("click",()=>{const value=Number(batchValue.value);if(batchValue.value===""||!Number.isFinite(value)||value<0||value>1000){saveStatus.className="save-status error";saveStatus.textContent="批量值必须在 0..1000 之间";return;}pointInputs.querySelectorAll("input").forEach(input=>{input.value=String(value);input.dispatchEvent(new Event("input"));});saveStatus.className="save-status";saveStatus.textContent="已应用到输入框，点击保存后写入数据库。";});batchRatioApply.addEventListener("click",()=>{const value=Number(batchRatioValue.value);if(batchRatioValue.value===""||!Number.isFinite(value)||value<0||value>100){saveStatus.className="save-status error";saveStatus.textContent="批量比例必须在 0..100 之间";return;}pointInputs.querySelectorAll("input").forEach(input=>{input.value=String(value);input.dispatchEvent(new Event("input"));});saveStatus.className="save-status";saveStatus.textContent="已应用到输入框，点击保存后写入数据库。";});editorSave.addEventListener("click",saveAdjustments);
    chart.addEventListener("pointerdown",beginSelection);chart.addEventListener("pointermove",moveSelection);chart.addEventListener("pointerup",endSelection);chart.addEventListener("pointercancel",event=>{if(drag&&drag.pointerId===event.pointerId){drag.box.remove();drag=null;}});datePicker.addEventListener("change",event=>loadDate(event.target.value));initialize();
  </script>
